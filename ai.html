<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviseWell · AI Study Assistant</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    
    /* Floating animation for background icons */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    
    @keyframes floatReverse {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(15px) rotate(-3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    
    /* Background icons container */
    .background-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    
    .bg-icon {
      position: absolute;
      opacity: 0.08;
      color: #2c3e50;
    }
    
    .icon-1 {
      top: 15%;
      left: 8%;
      animation: float 12s ease-in-out infinite;
      width: 80px;
      height: 80px;
    }
    .icon-2 {
      bottom: 20%;
      right: 10%;
      animation: floatReverse 15s ease-in-out infinite;
      width: 100px;
      height: 100px;
    }
    .icon-3 {
      top: 40%;
      right: 15%;
      animation: float 10s ease-in-out infinite;
      width: 60px;
      height: 60px;
    }
    .icon-4 {
      bottom: 15%;
      left: 12%;
      animation: floatReverse 18s ease-in-out infinite;
      width: 70px;
      height: 70px;
    }
    
    /* Main content should be above background */
    main {
      position: relative;
      z-index: 1;
    }
    
    /* Blinking animation for mic icon during listening */
    .blink-mic {
      animation: blinkIcon 1s infinite;
    }
    @keyframes blinkIcon {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    /* Static mic after listening */
    .static-mic {
      animation: none;
    }
    .caret-blink::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1.4em;
      background-color: #ea580c;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* AI Loading animation */
    .ai-loading {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .ai-loading span {
      width: 8px;
      height: 8px;
      background-color: #16a34a;
      border-radius: 50%;
      display: inline-block;
      animation: aiLoading 1.4s infinite ease-in-out both;
    }
    .ai-loading span:nth-child(1) {
      animation-delay: -0.32s;
    }
    .ai-loading span:nth-child(2) {
      animation-delay: -0.16s;
    }
    @keyframes aiLoading {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* Mic button glow effect - orange */
    .mic-glow {
      box-shadow: 0 0 20px rgba(234, 88, 12, 0.5);
      transition: box-shadow 0.3s ease;
    }
    .mic-glow:hover {
      box-shadow: 0 0 30px rgba(234, 88, 12, 0.8);
    }
    
    /* Question input container - fixed at bottom */
    .question-input-container {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      z-index: 20;
      display: none;
    }
    
    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: white;
      border-radius: 9999px;
      padding: 0.5rem 0.5rem 0.5rem 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      border: 1px solid #e5e7eb;
    }
    
    #questionInput {
      flex: 1;
      border: none;
      outline: none;
      padding: 0.75rem 0;
      font-size: 1rem;
      background: transparent;
    }
    
    .action-button {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
    }
    
    .action-button:hover {
      transform: scale(1.1);
    }
    
    #submitQuestion {
      color: #16a34a;
    }
    #submitQuestion:hover {
      color: #15803d;
    }
    
    #voiceInputButton {
      color: #ea580c;
    }
    #voiceInputButton:hover {
      color: #c2410c;
    }
    
    /* Merged Q&A container */
    .merged-qa-container {
      background: white;
      border-radius: 1rem;
      padding: 1.25rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border: 1px solid #e5e7eb;
      margin-bottom: 7rem;
    }
    
    .qa-pair {
      border-bottom: 1px solid #f0f0f0;
      padding: 1rem 0;
    }
    .qa-pair:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body class="bg-blue-50 antialiased">

<!-- Floating background icons -->
<div class="background-icons">
  <i data-lucide="book-open" class="bg-icon icon-1"></i>
  <i data-lucide="graduation-cap" class="bg-icon icon-2"></i>
  <i data-lucide="atom" class="bg-icon icon-3"></i>
  <i data-lucide="cpu" class="bg-icon icon-4"></i>
</div>

<!-- Question input container - appears after answer -->
<div id="questionInputContainer" class="question-input-container">
  <div class="input-wrapper">
    <input type="text" id="questionInput" placeholder="Type your question here..." autocomplete="off">
    <button id="voiceInputButton" class="action-button" title="Click to speak">
      <i data-lucide="mic" class="w-5 h-5"></i>
    </button>
    <button id="submitQuestion" class="action-button" title="Send question">
      <i data-lucide="send" class="w-5 h-5"></i>
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="max-w-6xl mx-auto px-4 py-12">
  <!-- Merged container for all Q&A pairs -->
  <div id="mergedQAContainer" class="merged-qa-container mb-12 hidden">
    <div id="qaPairsContainer" class="space-y-4"></div>
  </div>

  <!-- Current conversation area -->
  <div id="currentConversation" class="mt-8">
    <!-- listening view -->
    <div id="listeningView" class="flex-col items-center w-full">
      <div class="w-full max-w-3xl mb-6 mx-auto">
        <div class="flex items-start justify-between">
          <!-- Bold Listening text on left - only shown during voice input -->
          <div class="flex-1">
            <h2 id="listeningText" class="text-2xl font-bold text-gray-800 hidden">Listening...</h2>
          </div>
          <!-- timer circle container - only shown during voice input -->
          <div id="timerContainer" class="ml-4 hidden">
            <div class="relative w-10 h-10">
              <svg class="w-10 h-10 -rotate-90 transform" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="2.5"></circle>
                <circle id="timerCircle" cx="18" cy="18" r="16" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="100.5" stroke-dashoffset="0" stroke-linecap="round"></circle>
              </svg>
              <span id="timerText" class="absolute inset-0 flex items-center justify-center text-xs font-bold text-orange-600">10s</span>
            </div>
          </div>
        </div>
      </div>

      <!-- question card -->
      <div class="w-auto max-w-3xl slide-up mb-8 mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-lg border border-gray-200 inline-block">
          <div class="flex items-start gap-3">
            <div id="micIconContainer" class="p-2.5 bg-orange-500 rounded-full flex-shrink-0">
              <i data-lucide="mic" class="w-4 h-4 text-white"></i>
            </div>
            <div>
              <h3 class="text-xs font-semibold text-gray-500 mb-1">Your Question</h3>
              <p class="text-gray-800 text-base" id="transcriptText"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- AI Loading Indicator -->
      <div id="aiLoadingContainer" class="w-auto max-w-3xl hidden mb-8 mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-lg border border-gray-200 inline-block">
          <div class="flex items-center gap-4">
            <div class="p-2 bg-green-100 rounded-lg">
              <i data-lucide="bot" class="w-5 h-5 text-green-600"></i>
            </div>
            <div>
              <h3 class="text-xs font-semibold text-gray-500 mb-2">AI is thinking</h3>
              <div class="ai-loading">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- answer card -->
      <div id="answerContainer" class="w-auto max-w-3xl hidden mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-lg border border-gray-200 inline-block">
          <div class="flex items-start gap-3">
            <div class="p-2 bg-green-100 rounded-lg flex-shrink-0">
              <i data-lucide="sparkles" class="w-4 h-4 text-green-600"></i>
            </div>
            <div>
              <h3 class="text-xs font-semibold text-gray-500 mb-1">Answer</h3>
              <p class="text-gray-800 text-base" id="answerText"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  $(function(){
    const TIMER_DURATION = 10;
    const AI_LOADING_DURATION = 1500;

    // State variables
    let timeLeft = TIMER_DURATION;
    let timerInterval = null;
    let answerTypeInterval = null;
    let loadingTimeout = null;
    let transcript = '';
    let qaPairs = []; // Store all Q&A pairs
    let isProcessing = false; // Prevent duplicate processing

    // DOM elements
    const $listeningText = $('#listeningText');
    const $transcriptSpan = $('#transcriptText');
    const $timerContainer = $('#timerContainer');
    const $timerText = $('#timerText');
    const $timerCircle = $('#timerCircle');
    const $micIconContainer = $('#micIconContainer');
    const $aiLoadingContainer = $('#aiLoadingContainer');
    const $answerContainer = $('#answerContainer');
    const $answerText = $('#answerText');
    const $mergedQAContainer = $('#mergedQAContainer');
    const $qaPairsContainer = $('#qaPairsContainer');
    const $questionInputContainer = $('#questionInputContainer');
    const $questionInput = $('#questionInput');
    const $voiceInputButton = $('#voiceInputButton');
    const $submitButton = $('#submitQuestion');

    // Get question from URL parameter if it exists
    const urlParams = new URLSearchParams(window.location.search);
    const urlQuestion = urlParams.get('question');
    
    if (urlQuestion) {
      // Remove the parameter from URL without refreshing
      const newUrl = window.location.pathname;
      window.history.replaceState({}, document.title, newUrl);
      
      // First conversation - use voice with timer
      startListeningWithQuestion(urlQuestion, true);
    } else {
      // First conversation - start with voice recognition
      startSpeechRecognition();
    }

    function scrollToElement($element) {
      if ($element && $element.length) {
        $('html, body').animate({
          scrollTop: $element.offset().top - 100
        }, 500);
      }
    }

    function typeAnswer(text, callback) {
      let index = 0;
      $answerText.text('');
      
      answerTypeInterval = setInterval(() => {
        if (index < text.length) {
          $answerText.text($answerText.text() + text[index]);
          index++;
        } else {
          clearInterval(answerTypeInterval);
          answerTypeInterval = null;
          if (callback) callback();
        }
      }, 15);
    }

    // Function to add Q&A pair to merged container
    function addToMergedContainer(question, answer) {
      // Add to array
      qaPairs.push({ question, answer });
      
      // Clear and rebuild the merged container
      $qaPairsContainer.empty();
      
      qaPairs.forEach((pair, index) => {
        const pairHtml = `
          <div class="qa-pair ${index === 0 ? 'pt-0' : ''}">
            <div class="flex items-start gap-3 mb-3">
              <div class="p-2 bg-orange-500 rounded-full flex-shrink-0">
                <i data-lucide="mic" class="w-4 h-4 text-white"></i>
              </div>
              <div class="flex-1">
                <h3 class="text-xs font-semibold text-gray-500 mb-1">Your Question</h3>
                <p class="text-gray-800 text-base">${pair.question}</p>
              </div>
            </div>
            <div class="flex items-start gap-3 pl-9">
              <div class="p-2 bg-green-100 rounded-lg flex-shrink-0">
                <i data-lucide="sparkles" class="w-4 h-4 text-green-600"></i>
              </div>
              <div class="flex-1">
                <h3 class="text-xs font-semibold text-gray-500 mb-1">Answer</h3>
                <p class="text-gray-800 text-base">${pair.answer}</p>
              </div>
            </div>
          </div>
        `;
        $qaPairsContainer.append(pairHtml);
      });
      
      // Show the merged container
      $mergedQAContainer.removeClass('hidden');
      
      // Refresh icons for the new content
      refreshIcons();
    }

    function getAIAnswer(question, callback) {
      $.ajax({
        url: 'ai_answer.php',
        method: 'POST',
        data: { question: question },
        success: function(response) {
          callback(response);
        },
        error: function() {
          callback('Sorry, I encountered an error. Please try again.');
        }
      });
    }

    function showAIWithLoading(question) {
      if (isProcessing) return;
      isProcessing = true;
      
      $timerContainer.addClass('hidden');
      $aiLoadingContainer.removeClass('hidden');
      
      setTimeout(() => {
        scrollToElement($aiLoadingContainer);
      }, 100);
      
      getAIAnswer(question, function(answer) {
        if (loadingTimeout) clearTimeout(loadingTimeout);
        
        loadingTimeout = setTimeout(() => {
          $aiLoadingContainer.addClass('hidden');
          $answerContainer.removeClass('hidden');
          typeAnswer(answer, function() {
            // Add to merged container
            addToMergedContainer(question, answer);
            
            // Hide the current question and answer cards
            $('.w-auto.max-w-3xl.slide-up.mb-8.mx-auto').hide();
            $answerContainer.addClass('hidden');
            
            // Show the question input container for next question
            $questionInputContainer.show();
            
            // Focus on input
            $questionInput.focus();
            
            isProcessing = false;
            
            setTimeout(() => {
              scrollToElement($questionInputContainer);
            }, 100);
          });
        }, AI_LOADING_DURATION);
      });
    }

    function startListeningWithQuestion(questionText, isVoiceInput = false) {
      stopAllIntervals();
      timeLeft = TIMER_DURATION;
      transcript = questionText;

      // Hide the question input container
      $questionInputContainer.hide();
      
      // Show the question card
      $('.w-auto.max-w-3xl.slide-up.mb-8.mx-auto').show();
      
      // Show listening text and timer ONLY for voice input
      if (isVoiceInput) {
        $listeningText.removeClass('hidden');
        $timerContainer.removeClass('hidden');
        $micIconContainer.addClass('blink-mic');
      } else {
        $listeningText.addClass('hidden');
        $timerContainer.addClass('hidden');
        $micIconContainer.removeClass('blink-mic');
      }
      
      $transcriptSpan.text(questionText);
      $micIconContainer.removeClass('static-mic');
      $aiLoadingContainer.addClass('hidden');
      $answerContainer.addClass('hidden');
      $answerText.text('');
      updateTimerDisplay(TIMER_DURATION);

      // Only start timer for voice input
      if (isVoiceInput) {
        timerInterval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft -= 1;
            updateTimerDisplay(timeLeft);
            if (timeLeft === 0) {
              clearInterval(timerInterval);
              timerInterval = null;
              
              // Hide listening text and timer when countdown completes
              $listeningText.addClass('hidden');
              $timerContainer.addClass('hidden');
              $micIconContainer.removeClass('blink-mic').addClass('static-mic');
              
              if (transcript.trim() !== '') {
                showAIWithLoading(transcript);
              }
            }
          }
        }, 1000);
      } else {
        // For typed questions, immediately show AI loading
        if (transcript.trim() !== '') {
          showAIWithLoading(transcript);
        }
      }
    }

    function startSpeechRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Speech recognition is not supported in your browser.');
        return;
      }
      
      try {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-IN";
        recognition.continuous = false;
        recognition.interimResults = true;
        
        let finalTranscript = '';
        
        recognition.onstart = function() {
          startListeningWithQuestion('', true); // true indicates voice input
        };
        
        recognition.onresult = function(event) {
          let interimTranscript = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += transcript;
              $transcriptSpan.text(finalTranscript);
              window.transcript = finalTranscript;
            } else {
              interimTranscript += transcript;
              $transcriptSpan.text(finalTranscript + interimTranscript);
            }
          }
        };
        
        recognition.onend = function() {
          if (finalTranscript) {
            transcript = finalTranscript;
            $transcriptSpan.text(finalTranscript);
          }
        };
        
        recognition.onerror = function() {
          alert('Speech recognition error. Please try again.');
        };
        
        recognition.start();
      } catch(e) {
        alert('Could not start speech recognition.');
      }
    }

    function refreshIcons() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    }

    function updateTimerDisplay(value) {
      const radius = 16;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - value / TIMER_DURATION);
      $timerCircle.css('stroke-dasharray', circumference);
      $timerCircle.css('stroke-dashoffset', offset);
      $timerText.text(`${value}s`);
    }

    function stopAllIntervals() {
      if (timerInterval) clearInterval(timerInterval);
      if (answerTypeInterval) clearInterval(answerTypeInterval);
      if (loadingTimeout) clearTimeout(loadingTimeout);
      timerInterval = null;
      answerTypeInterval = null;
      loadingTimeout = null;
    }

    // Submit question from input - typed question (no timer/listening)
    $submitButton.on('click', function() {
      const question = $questionInput.val().trim();
      if (question) {
        $questionInput.val('');
        startListeningWithQuestion(question, false); // false indicates typed input - no timer/listening
      }
    });

    // Voice input button - voice input (shows timer/listening)
    $voiceInputButton.on('click', function() {
      startSpeechRecognition();
    });

    // Allow Enter key to submit
    $questionInput.on('keypress', function(e) {
      if (e.which === 13) { // Enter key
        e.preventDefault();
        $submitButton.click();
      }
    });

    refreshIcons();
  });
</script>
</body>
</html>
