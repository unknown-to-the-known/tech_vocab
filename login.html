<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisewell Vocab - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-slide-in {
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Blue border for active phone input */
        .phone-input-active {
            border-color: #3b82f6 !important;
            border-width: 2px !important;
        }
        
        /* Text field focus color */
        .phone-input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
        }
    </style>
</head>
<body class="min-h-screen bg-white flex items-center justify-center p-4">
    
    <!-- Login Screen -->
    <div id="login-screen" class="w-full max-w-md relative z-10 animate-fade-in">
        <!-- Logo and Title -->
        <div class="text-center mb-5">
            <div class="inline-flex items-center justify-center mb-4">
                <img src="revisewell_logo.png" alt="Revisewell Vocab" class="w-24 h-24">
            </div>
            <h1 class="text-4xl font-bold text-gray-900">
                Revisewell <span class="text-orange-500">Vocab</span>
            </h1>
            <p class="text-gray-600 text-base mt-1">Your learning journey continues here</p>
        </div>

        <!-- Login Content -->
        <div class="space-y-6">
            <!-- Phone Input Screen -->
            <div class="phone-screen space-y-6 animate-slide-in">
                <div class="text-center">
                    <h2 class="text-3xl font-bold text-gray-900 mb-1">
                        <span class="text-green-500">Login</span>
                    </h2>
                    <p class="text-gray-600">Enter your mobile number to login</p>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <div class="absolute left-6 top-1/2 -translate-y-1/2">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                        </div>
                        
                        <input
                            type="tel"
                            placeholder="Mobile Number"
                            class="phone-input w-full px-6 py-5 bg-white border-2 border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-400 transition-all text-xl tracking-wider shadow-lg pl-16 pr-16"
                            maxlength="11"
                            autofocus
                        />
                        
                        <div class="absolute right-6 top-1/2 -translate-y-1/2">
                            <div class="phone-counter text-sm text-gray-500 font-medium">
                                0/10
                            </div>
                        </div>
                    </div>
                </div>

                <p class="text-xs text-gray-500 text-center">
                    By continuing, you agree to our Terms of Service and Privacy Policy
                </p>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            // Format phone
            function formatPhone(val) {
                return val.length <= 5 ? val : val.slice(0, 5) + ' ' + val.slice(5);
            }
            
            // Phone input
            $('.phone-input').on('input', function() {
                let digits = $(this).val().replace(/\D/g, '').slice(0, 10);
                
                $(this).val(formatPhone(digits));
                $('.phone-counter').text(digits.length + '/10');
                $(this).toggleClass('phone-input-active', digits.length > 0);
                
                if (digits.length === 10) {
                    // Store phone number in sessionStorage before redirect
                    sessionStorage.setItem('phoneNumber', digits);
                    // Redirect to OTP page
                    window.location.href = 'otp.html';
                }
            });
        });
    </script>
</body>
</html>
