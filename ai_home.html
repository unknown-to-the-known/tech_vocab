<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReviseWell · AI Study Assistant</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font (Nunito) -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { font-family: 'Nunito', sans-serif; }
    
    /* Main content */
    main {
      position: relative;
      z-index: 10;
    }
    
    /* Mic button glow effect - orange */
    .mic-glow {
      box-shadow: 0 0 20px rgba(234, 88, 12, 0.5);
      transition: box-shadow 0.3s ease;
    }
    .mic-glow:hover {
      box-shadow: 0 0 30px rgba(234, 88, 12, 0.8);
    }

    /* Scrollable container without scrollbar */
    .scrollable-row {
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      /* Hide scrollbar for Chrome, Safari and Opera */
      scrollbar-width: none;  /* Firefox */
      -ms-overflow-style: none;  /* IE and Edge */
    }
    .scrollable-row::-webkit-scrollbar {
      display: none;  /* Chrome, Safari, Opera */
    }

    /* Background movable icons - auto moving */
    .background-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .moving-icon {
      position: absolute;
      width: 56px;
      height: 56px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
      animation: floatAround 20s infinite ease-in-out;
    }

    /* Three colors: orange, blue, green */
    .moving-icon.orange { color: #f97316; }  /* orange-500 */
    .moving-icon.blue { color: #3b82f6; }    /* blue-500 */
    .moving-icon.green { color: #22c55e; }    /* green-500 */

    /* Different animation speeds and delays for each icon */
    #icon1 {
      top: 5%;
      left: 3%;
      animation-duration: 24s;
      animation-delay: 0s;
    }
    
    #icon2 {
      top: 15%;
      right: 8%;
      animation-duration: 28s;
      animation-delay: 2s;
    }
    
    #icon3 {
      bottom: 20%;
      left: 12%;
      animation-duration: 22s;
      animation-delay: 4s;
    }
    
    #icon4 {
      bottom: 10%;
      right: 5%;
      animation-duration: 26s;
      animation-delay: 1s;
    }
    
    #icon5 {
      top: 40%;
      left: 20%;
      animation-duration: 30s;
      animation-delay: 3s;
    }
    
    #icon6 {
      top: 60%;
      right: 15%;
      animation-duration: 25s;
      animation-delay: 5s;
    }

    @keyframes floatAround {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      20% {
        transform: translate(40px, -25px) rotate(18deg) scale(1.1);
      }
      40% {
        transform: translate(70px, 30px) rotate(36deg) scale(0.9);
      }
      60% {
        transform: translate(20px, 70px) rotate(54deg) scale(1.05);
      }
      80% {
        transform: translate(-40px, 20px) rotate(72deg) scale(0.95);
      }
      100% {
        transform: translate(0, 0) rotate(90deg) scale(1);
      }
    }

    /* Footer text */
    .footer-text {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: #6b7280;
      z-index: 20;
      background-color: transparent;
      padding: 4px;
    }

    /* Move content down */
    .content-wrapper {
      margin-top: 40px;
    }
    
    /* Increased gap between Revisewell AI and Ask your question */
    .title-section {
      margin-bottom: 30px; /* Increased from default */
    }
  </style>
</head>
<body class="bg-blue-50 antialiased relative min-h-screen">

<!-- Background auto-moving icons - exactly 6 icons scattered all around -->
<div class="background-icons" id="movableIconsContainer">
  <!-- Orange icons (2) -->
  <i data-lucide="star" class="moving-icon orange" id="icon1"></i>
  <i data-lucide="rocket" class="moving-icon orange" id="icon2"></i>
  
  <!-- Blue icons (2) -->
  <i data-lucide="globe" class="moving-icon blue" id="icon3"></i>
  <i data-lucide="book-open" class="moving-icon blue" id="icon4"></i>
  
  <!-- Green icons (2) -->
  <i data-lucide="atom" class="moving-icon green" id="icon5"></i>
  <i data-lucide="leaf" class="moving-icon green" id="icon6"></i>
</div>

<!-- MAIN CONTENT -->
<main class="max-w-6xl mx-auto px-4 py-12 relative z-10">
  <!-- Added content-wrapper class to move content down -->
  <div id="initialView" class="flex flex-col items-center fade-in content-wrapper">
    <!-- Title with logo - orange and green with Nunito font - added title-section class for increased bottom margin -->
    <div class="flex items-center justify-center gap-2 mb-3 title-section">
      <img src="revisewell_logo.png" alt="ReviseWell Logo" class="w-12 h-12 object-contain">
      <h1 class="text-3xl font-bold">
        <span class="text-orange-600">Revisewell</span><span class="text-green-600"> AI</span>
      </h1>
    </div>
    
    <!-- Ask Your Question - smaller -->
    <div class="text-center mb-2">
      <h2 class="text-lg font-semibold text-gray-800">Ask Your Question</h2>
    </div>
    
    <!-- Instruction paragraph -->
    <p class="text-sm text-gray-600 mb-6 text-center max-w-md bg-white/80 backdrop-blur-sm p-2 rounded-lg">
      Click on the microphone icon below and speak your question clearly. I'll listen for 10 seconds and provide a helpful answer.
    </p>
    
    <!-- Ask AI Button - orange -->
    <button id="askBtn" class="w-24 h-24 rounded-full bg-orange-600 mic-glow flex items-center justify-center hover:bg-orange-700 transition-all duration-300 mb-8">
      <i data-lucide="mic" class="w-10 h-10 text-white"></i>
    </button>
    
    <!-- Popular Questions Container - white container -->
    <div id="popularContainer" class="w-full max-w-4xl bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-lg border border-gray-100">
      <h3 class="text-sm font-medium text-gray-700 mb-4 text-center">Most people asked:</h3>
      <!-- Changed flex flex-wrap to scrollable-row for horizontal scrolling without scrollbar -->
      <div class="scrollable-row" id="popularQuestionsContainer">
        <!-- will be populated by JavaScript -->
      </div>
    </div>
  </div>
</main>

<!-- Footer text -->
<div class="footer-text">
  By using Revisewell AI, an AI chatbot, you agree to our Terms and have read our Privacy Policy.
</div>

<script>
  // Popular questions for display
  const popularQuestions = [
    "What is AI?",
    "How does gravity work?",
    "What is climate change?",
    "Explain photosynthesis",
    "How do computers work?",
    "What is the theory of relativity?"
  ];

  // Populate popular questions container
  const container = document.getElementById('popularQuestionsContainer');
  popularQuestions.forEach((question) => {
    const btn = document.createElement('div');
    btn.className = 'bg-orange-50 rounded-lg px-3 py-1.5 border border-orange-200 text-gray-700 text-xs hover:bg-orange-100 cursor-pointer transition-colors shadow-sm flex-shrink-0';
    btn.textContent = question;
    btn.onclick = function() {
      // Pass question via URL parameter instead of localStorage
      window.location.href = 'ai.html?question=' + encodeURIComponent(question);
    };
    container.appendChild(btn);
  });

  // Mic button click - redirect to chat page without any stored data
  document.getElementById('askBtn').addEventListener('click', function() {
    window.location.href = 'ai.html';
  });

  // Initialize Lucide icons
  lucide.createIcons();
</script>
</body>
</html>
