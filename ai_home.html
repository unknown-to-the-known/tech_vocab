<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ReviseWell · AI Study Assistant</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font (Nunito) -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { 
      font-family: 'Nunito', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    body {
      background-color: #eff6ff;
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    
    /* Main content */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    
    #initialView {
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      overflow: hidden;
    }
    
    /* Mic button with circles animation */
    .mic-with-circles {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }
    
    .mic-with-circles .mic-button {
      position: relative;
      z-index: 5;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background-color: #f97316;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease;
    }
    
    .mic-with-circles .mic-button:hover {
      background-color: #ea580c;
    }
    
    .circle {
      position: absolute;
      border-radius: 50%;
      background-color: rgba(249, 115, 22, 0.3);
      animation: pulse 2s infinite ease-out;
      z-index: 1;
    }
    
    .circle-1 {
      width: 105px;
      height: 105px;
      animation-delay: 0s;
    }
    
    .circle-2 {
      width: 115px;
      height: 115px;
      animation-delay: 0.5s;
      background-color: rgba(249, 115, 22, 0.2);
    }
    
    .circle-3 {
      width: 125px;
      height: 125px;
      animation-delay: 1s;
      background-color: rgba(249, 115, 22, 0.1);
    }
    
    @keyframes pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    /* Scrollable container without scrollbar */
    .scrollable-row {
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scrollable-row::-webkit-scrollbar {
      display: none;
    }

    /* Background movable icons */
    .background-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .moving-icon {
      position: absolute;
      width: 56px;
      height: 56px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
      animation: floatAround 20s infinite ease-in-out;
    }

    .moving-icon.orange { color: #f97316; }
    .moving-icon.blue { color: #3b82f6; }
    .moving-icon.green { color: #22c55e; }

    #icon1 {
      top: 5%;
      left: 3%;
      animation-duration: 24s;
      animation-delay: 0s;
    }
    
    #icon2 {
      top: 15%;
      right: 8%;
      animation-duration: 28s;
      animation-delay: 2s;
    }
    
    #icon3 {
      bottom: 20%;
      left: 12%;
      animation-duration: 22s;
      animation-delay: 4s;
    }
    
    #icon4 {
      bottom: 10%;
      right: 5%;
      animation-duration: 26s;
      animation-delay: 1s;
    }
    
    #icon5 {
      top: 40%;
      left: 20%;
      animation-duration: 30s;
      animation-delay: 3s;
    }
    
    #icon6 {
      top: 60%;
      right: 15%;
      animation-duration: 25s;
      animation-delay: 5s;
    }

    /* Mobile styles for 375x667 */
    @media (max-width: 768px) {
      #icon5, #icon6 {
        display: none;
      }
      
      #icon1, #icon2, #icon3, #icon4 {
        animation: gentleFloat 25s infinite ease-in-out;
      }
      
      #icon1 {
        animation-duration: 30s;
        animation-delay: 0s;
      }
      
      #icon2 {
        animation-duration: 32s;
        animation-delay: 1s;
      }
      
      #icon3 {
        animation-duration: 28s;
        animation-delay: 2s;
      }
      
      #icon4 {
        animation-duration: 35s;
        animation-delay: 0.5s;
      }
      
      .mobile-rocket {
        display: block;
        position: absolute;
        color: #22c55e;
        width: 35px;
        height: 35px;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 15;
        pointer-events: none;
      }
      
      /* Larger microphone on mobile - adjusted for 375x667 */
      .mic-with-circles .mic-button {
        width: 100px;
        height: 100px;
      }
      
      .mic-with-circles .circle-1 {
        width: 110px;
        height: 110px;
      }
      
      .mic-with-circles .circle-2 {
        width: 120px;
        height: 120px;
      }
      
      .mic-with-circles .circle-3 {
        width: 130px;
        height: 130px;
      }
      
      .mic-with-circles .mic-button i {
        width: 3rem;
        height: 3rem;
      }
      
      .mic-with-circles {
        margin: 5px 0 15px 0 !important;
      }
      
      .title-section {
        margin-bottom: 5px !important;
        gap: 0.5rem;
      }
      
      .title-section img {
        width: 35px;
        height: 35px;
      }
      
      .title-section h1 {
        font-size: 1.8rem;
      }
      
      h2.text-lg {
        font-size: 1rem;
        margin-bottom: 2px;
      }
      
      p.text-sm {
        font-size: 0.75rem;
        margin-bottom: 5px;
        padding: 6px 10px;
        max-width: 300px;
        line-height: 1.3;
      }
      
      #popularContainer {
        padding: 12px 10px !important;
        margin-top: 5px;
        max-width: 350px;
      }
      
      #popularContainer h3 {
        font-size: 0.8rem;
        margin-bottom: 8px;
      }
      
      .scrollable-row {
        gap: 0.3rem;
      }
      
      .scrollable-row div {
        padding: 0.5rem 0.7rem;
        font-size: 0.7rem;
      }
      
      .footer-text {
        font-size: 0.55rem;
        bottom: 2px;
        padding: 2px;
      }
    }

    /* Specific fix for 375x667 */
    @media (max-width: 380px) and (max-height: 670px) {
      #initialView {
        padding: 5px 10px;
        justify-content: center;
      }
      
      .title-section {
        margin-bottom: 2px !important;
      }
      
      .title-section img {
        width: 30px;
        height: 30px;
      }
      
      .title-section h1 {
        font-size: 1.6rem;
      }
      
      h2.text-lg {
        font-size: 0.9rem;
        margin-bottom: 0;
      }
      
      p.text-sm {
        font-size: 0.7rem;
        margin-bottom: 3px;
        padding: 4px 8px;
        max-width: 280px;
      }
      
      .mic-with-circles .mic-button {
        width: 90px;
        height: 90px;
      }
      
      .mic-with-circles .circle-1 {
        width: 100px;
        height: 100px;
      }
      
      .mic-with-circles .circle-2 {
        width: 110px;
        height: 110px;
      }
      
      .mic-with-circles .circle-3 {
        width: 120px;
        height: 120px;
      }
      
      .mic-with-circles {
        margin: 2px 0 10px 0 !important;
      }
      
      #popularContainer {
        padding: 8px 8px !important;
      }
    }

    @media (min-width: 769px) {
      .desktop-margin {
        margin-top: 20px !important;
      }
    }

    @keyframes floatAround {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      20% {
        transform: translate(40px, -25px) rotate(18deg) scale(1.1);
      }
      40% {
        transform: translate(70px, 30px) rotate(36deg) scale(0.9);
      }
      60% {
        transform: translate(20px, 70px) rotate(54deg) scale(1.05);
      }
      80% {
        transform: translate(-40px, 20px) rotate(72deg) scale(0.95);
      }
      100% {
        transform: translate(0, 0) rotate(90deg) scale(1);
      }
    }

    @keyframes gentleFloat {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      25% {
        transform: translate(15px, -10px) rotate(5deg) scale(1.02);
      }
      50% {
        transform: translate(25px, 15px) rotate(10deg) scale(0.98);
      }
      75% {
        transform: translate(-10px, 20px) rotate(5deg) scale(1.01);
      }
      100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
    }

    .footer-text {
      position: fixed;
      bottom: 2px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.6rem;
      color: #6b7280;
      z-index: 20;
      background-color: transparent;
      padding: 2px;
    }

    .content-wrapper {
      margin-top: 0;
      height: 100%;
    }
    
    .title-section {
      margin-bottom: 15px;
    }
  </style>
</head>
<body class="bg-blue-50 antialiased">

<!-- Background auto-moving icons -->
<div class="background-icons">
  <i data-lucide="star" class="moving-icon orange" id="icon1"></i>
  <i data-lucide="rocket" class="moving-icon orange" id="icon2"></i>
  <i data-lucide="globe" class="moving-icon blue" id="icon3"></i>
  <i data-lucide="book-open" class="moving-icon blue" id="icon4"></i>
  <i data-lucide="atom" class="moving-icon green" id="icon5"></i>
  <i data-lucide="leaf" class="moving-icon green" id="icon6"></i>
</div>

<!-- Mobile rocket icon -->
<i data-lucide="rocket" class="mobile-rocket" style="display: none;"></i>

<!-- MAIN CONTENT -->
<main>
  <div id="initialView">
    <!-- Title with logo -->
    <div class="flex items-center justify-center gap-2 title-section">
      <img src="revisewell_logo.png" alt="ReviseWell Logo" class="w-12 h-12 object-contain">
      <h1 class="text-3xl font-bold">
        <span class="text-orange-600">Revisewell</span><span class="text-green-600"> AI</span>
      </h1>
    </div>
    
    <!-- Ask Your Question -->
    <div class="text-center">
      <h2 class="text-lg font-semibold text-gray-800">Ask Your Question <i data-lucide="help-circle" class="inline w-5 h-5 ml-1 text-orange-500"></i></h2>
    </div>
    
    <!-- Instruction paragraph -->
    <p class="text-sm text-gray-600 text-center max-w-md bg-white/80 backdrop-blur-sm p-2 rounded-lg">
      Click on the microphone icon below and speak your question clearly. I'll listen for 10 seconds and provide a helpful answer.
    </p>
    
    <!-- Ask AI Button -->
    <div class="mic-with-circles">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
      <button id="askBtn" class="mic-button">
        <i data-lucide="mic" class="w-10 h-10 text-white"></i>
      </button>
    </div>
    
    <!-- Popular Questions Container -->
    <div id="popularContainer" class="w-full max-w-4xl bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-lg border border-gray-100">
      <h3 class="text-sm font-medium text-gray-700 mb-4 text-center">Most people asked <i data-lucide="message-square" class="inline w-4 h-4 ml-1 text-orange-500"></i></h3>
      <div class="scrollable-row" id="popularQuestionsContainer"></div>
    </div>
  </div>
</main>

<!-- Footer text -->
<div class="footer-text">
  By using Revisewell AI, an AI chatbot, you agree to our Terms and Privacy Policy.
</div>

<script>
  const popularQuestions = [
    { text: "What is AI?", icon: "bot" },
    { text: "How does gravity work?", icon: "globe" },
    { text: "What is climate change?", icon: "thermometer" },
    { text: "Explain photosynthesis", icon: "flower" },
    { text: "How do computers work?", icon: "cpu" },
    { text: "What is the theory of relativity?", icon: "sparkles" }
  ];

  const container = document.getElementById('popularQuestionsContainer');
  popularQuestions.forEach((item) => {
    const btn = document.createElement('div');
    btn.className = 'bg-orange-50 rounded-lg px-3 py-1.5 border border-orange-200 text-gray-700 text-xs hover:bg-orange-100 cursor-pointer transition-colors shadow-sm flex-shrink-0 flex items-center gap-1';
    btn.innerHTML = `<i data-lucide="${item.icon}" class="w-3 h-3 text-orange-500"></i> ${item.text}`;
    btn.onclick = function() {
      window.location.href = 'ai.html?question=' + encodeURIComponent(item.text);
    };
    container.appendChild(btn);
  });

  document.getElementById('askBtn').addEventListener('click', function() {
    window.location.href = 'ai.html';
  });

  lucide.createIcons();
</script>
</body>
</html>
